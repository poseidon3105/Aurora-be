name: Deploy Aurora API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/docker/apps/Aurora-be

            git pull origin main

            docker compose down
            docker compose up -d --build

            docker exec aurora-api npx prisma migrate deploy